<!doctype html>
<html lang="pt-br">

<head>

  <!--======================| Codificação e Responsividade |======================-->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <!--======================| SEO |======================-->
  <meta name="description" content="Portifólio Tiago Vieira" />
  <meta name="author" content="Tiago Vieira">
  <meta name="keywords" content="Tiago, Vieira, portifólio, desenvolvedor, sites, webdesing, software" />
  <meta property="og:title" content="Tiago Vieira - Desenvolvedor Full Stack">
  <meta name="robots" content="index, follow" />

  <!--======================| Fontes |======================-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Roboto:wght@300;400;500&display=swap" 
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">

  <!--======================| CSS |======================-->
  <link rel="stylesheet" href="../css/style.css" />

  <title>Contatos</title>

</head>

<body>

  <!--======================| Background |======================-->
  <div class="finisher-header" style="width: 100%; height: 100vh"></div>

  <!--======================| Menu |======================-->
  <div id="menu"></div>

  <script>
    fetch("../components/menu.html")
      .then((response) => response.text())
      .then((data) => {
        document.getElementById("menu").innerHTML = data;
      })
      .catch((error) => console.error("Erro ao carregar o menu:", error));
  </script>
  <!--======================| Menu |======================-->

  <!--======================| Contatos |======================-->
  <section class="contato">
    <div class="container">

      <h2>Contato</h2>

      <p class="contato-desc">
        Tem um projeto em mente ou precisa de um site profissional?
        Entre em contato e vamos conversar.
      </p>

      <div class="contato-wrapper">

        <form action="https://formspree.io/f/SEU_ID_AQUI" method="POST" class="form-contato">

          <div class="input-group">
            <input type="text" name="nome" required>
            <label>Seu nome</label>
          </div>

          <div class="input-group">
            <input type="email" name="email" required>
            <label>Seu e-mail</label>
          </div>

          <div class="input-group">
            <textarea name="mensagem" rows="5" required></textarea>
            <label>Mensagem</label>
          </div>

          <button type="submit" class="btn-contato">
            Enviar mensagem
          </button>

        </form>

        <div class="contato-info">
          <h3>Outras formas de contato</h3>
          <ul>
            <li>📞 (49) 99998-1782</li>
            <li>✉️ tiagoseinfert@gmail.com</li>
            <li><a href="https://github.com/tiagovieira-dev" target="_blank">GitHub</a></li>
            <li><a href="https://www.linkedin.com/" target="_blank">LinkedIn</a></li>
          </ul>
        </div>

      </div>

    </div>
  </section>
  <!--======================| Contatos |======================-->

  <!--======================| Rodapé |======================-->
  <div id="rodape"></div>

  <script>
    fetch("../components/rodape.html")
      .then((response) => response.text())
      .then((data) => {
        document.getElementById("rodape").innerHTML = data;
      })
      .catch((error) => console.error("Erro ao carregar o rodapé:", error));
  </script>
  <!--======================| Rodapé |======================-->

  <!--======================| Background |======================-->
  <script src="../js/finisher-header.es5.min.js" type="text/javascript"></script>
  <script src="../components/background.js"></script>
  <!--======================| Background |======================-->

</body>

</html>
